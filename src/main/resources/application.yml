# local 환경
spring:
  profiles:
    default: local
  datasource:
    url: jdbc:mysql://localhost:3306/jdbc
    username:
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
#    show-sql: true
    hibernate:
        ddl-auto: create
    properties:
        hibernate:
          format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: trace
